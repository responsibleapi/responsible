components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: api_key
      description: Required on all calls. Obtain from https://www.last.fm/api/account/create.
    SignedAuth:
      type: apiKey
      in: query
      name: api_sig
      description: |
        MD5 signature of all request parameters (excluding format and callback)
        sorted alphabetically by name, concatenated as name+value pairs, with
        the shared secret appended. Required for all write/auth methods.
  parameters:
    MethodParam:
      name: method
      in: query
      required: true
      schema:
        type: string
      description: |
        Method name in `package.method` format (e.g. `track.getInfo`,
        `chart.getTopArtists`, `user.getRecentTracks`).
    ApiKeyParam:
      name: api_key
      in: query
      required: true
      schema: { type: string }
      description: Your Last.fm API key.
    FormatParam:
      name: format
      in: query
      schema:
        type: string
        enum: [xml, json]
        default: xml
      description: Response format. Defaults to XML.
    CallbackParam:
      name: callback
      in: query
      schema: { type: string }
      description: Optional JSONP callback function name when `format=json`.
  requestBodies:
    AlbumTagWrite:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [method, api_key, artist, album, tags, sk, api_sig]
            properties:
              method: { type: string, enum: [album.addTags, album.removeTag] }
              api_key: { type: string }
              artist: { type: string }
              album: { type: string }
              tags:
                {
                  type: string,
                  description: Comma-separated tag list (max 10 for addTags).,
                }
              tag: { type: string, description: Single tag (for removeTag). }
              sk: { type: string }
              api_sig: { type: string }
    ArtistTagWrite:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [method, api_key, artist, sk, api_sig]
            properties:
              method: { type: string, enum: [artist.addTags, artist.removeTag] }
              api_key: { type: string }
              artist: { type: string }
              tags: { type: string }
              tag: { type: string }
              sk: { type: string }
              api_sig: { type: string }
    TrackTagWrite:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [method, api_key, artist, track, sk, api_sig]
            properties:
              method: { type: string, enum: [track.addTags, track.removeTag] }
              api_key: { type: string }
              artist: { type: string }
              track: { type: string }
              tags: { type: string }
              tag: { type: string }
              sk: { type: string }
              api_sig: { type: string }
  responses:
    ErrorResponse:
      description: Error response (status='failed').
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorPayload" }
        application/xml:
          schema:
            type: string
            description: '`<lfm status="failed"><error code="N">message</error></lfm>`'
  schemas:
    WriteRequestBody:
      type: object
      required: [method, api_key]
      properties:
        method: { type: string }
        api_key: { type: string }
        sk:
          {
            type: string,
            description: Session key returned by auth.getSession / auth.getMobileSession.,
          }
        api_sig:
          { type: string, description: MD5 signature of params + secret. }
      additionalProperties: true

    WriteResponse:
      type: object
      properties:
        status: { type: string, example: ok }

    ErrorPayload:
      type: object
      properties:
        error:
          type: integer
          description: |
            Numeric Last.fm error code. Common: 2 invalid service, 3 invalid method,
            4 authentication failed, 5 invalid format, 6 invalid parameters,
            7 invalid resource, 8 operation failed, 9 invalid session key,
            10 invalid api key, 11 service offline, 13 invalid method signature,
            16 service temporarily unavailable, 26 suspended api key, 29 rate limit exceeded.
        message: { type: string }

    Image:
      type: object
      properties:
        size: { type: string, enum: [small, medium, large, extralarge, mega] }
        "#text": { type: string, format: uri }

    Tag:
      type: object
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        count: { type: integer }

    Wiki:
      type: object
      properties:
        published: { type: string }
        summary: { type: string }
        content: { type: string }

    Album:
      type: object
      properties:
        artist: { type: string }
        name: { type: string }
        mbid: { type: string }
        url: { type: string, format: uri }
        image:
          type: array
          items: { $ref: "#/components/schemas/Image" }
        listeners: { type: string }
        playcount: { type: string }
        tracks:
          type: object
          properties:
            track:
              type: array
              items: { $ref: "#/components/schemas/Track" }
        tags:
          type: object
          properties:
            tag:
              type: array
              items: { $ref: "#/components/schemas/Tag" }
        wiki: { $ref: "#/components/schemas/Wiki" }

    Artist:
      type: object
      properties:
        name: { type: string }
        mbid: { type: string }
        url: { type: string, format: uri }
        image:
          type: array
          items: { $ref: "#/components/schemas/Image" }
        streamable: { type: string }
        ontour: { type: string }
        stats:
          type: object
          properties:
            listeners: { type: string }
            playcount: { type: string }
        similar:
          type: object
          properties:
            artist:
              type: array
              items: { $ref: "#/components/schemas/Artist" }
        tags:
          type: object
          properties:
            tag:
              type: array
              items: { $ref: "#/components/schemas/Tag" }
        bio: { $ref: "#/components/schemas/Wiki" }

    Track:
      type: object
      properties:
        name: { type: string }
        mbid: { type: string }
        url: { type: string, format: uri }
        duration: { type: string }
        artist: { $ref: "#/components/schemas/Artist" }
        album:
          type: object
          properties:
            artist: { type: string }
            title: { type: string }
            mbid: { type: string }
            url: { type: string, format: uri }
        listeners: { type: string }
        playcount: { type: string }
        userplaycount: { type: string }
        userloved: { type: string, enum: ["0", "1"] }
        toptags:
          type: object
          properties:
            tag:
              type: array
              items: { $ref: "#/components/schemas/Tag" }
        wiki: { $ref: "#/components/schemas/Wiki" }
        "@attr":
          type: object
          properties:
            nowplaying: { type: string }
        date:
          type: object
          properties:
            uts: { type: string }
            "#text": { type: string }

    UserProfile:
      type: object
      properties:
        name: { type: string }
        realname: { type: string }
        url: { type: string, format: uri }
        country: { type: string }
        age: { type: string }
        gender: { type: string }
        subscriber: { type: string }
        playcount: { type: string }
        playlists: { type: string }
        bootstrap: { type: string }
        registered:
          type: object
          properties:
            unixtime: { type: string }
            "#text": { type: string }
        image:
          type: array
          items: { $ref: "#/components/schemas/Image" }

    AlbumInfoResponse:
      type: object
      properties:
        album: { $ref: "#/components/schemas/Album" }

    ArtistInfoResponse:
      type: object
      properties:
        artist: { $ref: "#/components/schemas/Artist" }

    TrackInfoResponse:
      type: object
      properties:
        track: { $ref: "#/components/schemas/Track" }

    UserInfoResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/UserProfile" }

    TagInfoResponse:
      type: object
      properties:
        tag:
          type: object
          properties:
            name: { type: string }
            total: { type: integer }
            reach: { type: integer }
            wiki: { $ref: "#/components/schemas/Wiki" }

    TopTagsResponse:
      type: object
      properties:
        toptags:
          type: object
          properties:
            tag:
              type: array
              items: { $ref: "#/components/schemas/Tag" }

    TagListResponse:
      type: object
      properties:
        tags:
          type: object
          properties:
            tag:
              type: array
              items: { $ref: "#/components/schemas/Tag" }

    TopAlbumsResponse:
      type: object
      properties:
        topalbums:
          type: object
          properties:
            album:
              type: array
              items: { $ref: "#/components/schemas/Album" }

    TopTracksResponse:
      type: object
      properties:
        toptracks:
          type: object
          properties:
            track:
              type: array
              items: { $ref: "#/components/schemas/Track" }

    ChartResponse:
      type: object
      properties:
        artists:
          type: object
          properties:
            artist:
              type: array
              items: { $ref: "#/components/schemas/Artist" }

    GeoResponse:
      type: object
      properties:
        topartists:
          type: object
          properties:
            artist:
              type: array
              items: { $ref: "#/components/schemas/Artist" }

    SearchResponse:
      type: object
      properties:
        results:
          type: object
          properties:
            "opensearch:Query": { type: object, additionalProperties: true }
            "opensearch:totalResults": { type: string }
            "opensearch:startIndex": { type: string }
            "opensearch:itemsPerPage": { type: string }
            albummatches:
              type: object
              properties:
                album:
                  { type: array, items: { $ref: "#/components/schemas/Album" } }
            artistmatches:
              type: object
              properties:
                artist:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/Artist" },
                  }
            trackmatches:
              type: object
              properties:
                track:
                  { type: array, items: { $ref: "#/components/schemas/Track" } }

    RecentTracksResponse:
      type: object
      properties:
        recenttracks:
          type: object
          properties:
            track:
              type: array
              items: { $ref: "#/components/schemas/Track" }
            "@attr":
              type: object
              properties:
                user: { type: string }
                page: { type: string }
                perPage: { type: string }
                totalPages: { type: string }
                total: { type: string }

    SessionResponse:
      type: object
      properties:
        session:
          type: object
          properties:
            name: { type: string }
            key: { type: string }
            subscriber: { type: integer }

    ScrobbleResponse:
      type: object
      properties:
        scrobbles:
          type: object
          properties:
            "@attr":
              type: object
              properties:
                accepted: { type: integer }
                ignored: { type: integer }
            scrobble:
              type: array
              items:
                type: object
                properties:
                  artist:
                    {
                      type: object,
                      properties:
                        {
                          "#text": { type: string },
                          corrected: { type: string },
                        },
                    }
                  album:
                    {
                      type: object,
                      properties:
                        {
                          "#text": { type: string },
                          corrected: { type: string },
                        },
                    }
                  track:
                    {
                      type: object,
                      properties:
                        {
                          "#text": { type: string },
                          corrected: { type: string },
                        },
                    }
                  timestamp: { type: string }
                  ignoredMessage:
                    type: object
                    properties:
                      code: { type: string }
                      "#text": { type: string }
