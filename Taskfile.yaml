version: 3

includes:
  hono:
    taskfile: packages/hono/Taskfile.yaml
    dir: packages/hono
  ts:
    taskfile: packages/ts/Taskfile.yaml
    dir: packages/ts

tasks:
  reindex:
    cmd: uvx code-review-graph build
    sources:
      - packages/**/*.ts
      - scripts/**/*.ts

  check:
    deps:
      - hono:check
      - ts:check

  publish:auth:
    cmd: bun pm whoami

  publish:guard:
    cmd: bun scripts/publish-guard.ts

  release:ts:
    cmds:
      - task: publish:auth
      - task: publish:guard
      - task: ts:publish

  release:hono:
    cmds:
      - task: publish:auth
      - task: publish:guard
      - task: hono:publish
