version: 3

vars:
  LOCKFILE: ../../bun.lock

tasks:
  types:
    cmd: bun tsc
    sources:
      - "{{.LOCKFILE}}"
      - ../../tsconfig.base.json
      - tsconfig.json
      - src/**/*
    generates:
      - tsconfig.tsbuildinfo

  lint:
    cmd: bun --cwd ../.. oxlint {{.PACKAGE_DIR}}/src --fix
    sources:
      - "{{.LOCKFILE}}"
      - ../../oxlint.config.ts
      - src/**/*

  fmt:
    cmd: >-
      bun --cwd ../.. oxfmt
      {{.PACKAGE_DIR}}/src
      {{.PACKAGE_DIR}}/package.json
      {{.PACKAGE_DIR}}/Taskfile.yaml
      {{.PACKAGE_DIR}}/tsconfig.json
    sources:
      - "{{.LOCKFILE}}"
      - ../../.oxfmtrc.jsonc
      - src/**/*

  fmt:check:
    cmd: >-
      bun --cwd ../.. oxfmt --check
      {{.PACKAGE_DIR}}/src
      {{.PACKAGE_DIR}}/package.json
      {{.PACKAGE_DIR}}/Taskfile.yaml
      {{.PACKAGE_DIR}}/tsconfig.json
    sources:
      - "{{.LOCKFILE}}"
      - ../../.oxfmtrc.jsonc
      - src/**/*

  test:
    cmd: bun test
    sources:
      - "{{.LOCKFILE}}"
      - src/**/*

  check:
    deps:
      - types
      - lint
      - test
