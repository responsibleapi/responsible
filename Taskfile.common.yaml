version: 3

vars:
  LOCKFILE: ../../bun.lock

tasks:
  types:
    run: once
    cmd: bun tsc
    sources:
      - "{{.LOCKFILE}}"
      - ../../tsconfig.base.json
      - tsconfig.json
      - src/**/*
    generates:
      - tsconfig.tsbuildinfo

  lint:
    run: once
    cmd: bun oxlint --config ../../oxlint.config.ts src/
    sources:
      - "{{.LOCKFILE}}"
      - ../../oxlint.config.ts
      - src/**/*

  lint:fix:
    cmd: bun oxlint --config ../../oxlint.config.ts src/ --fix
    sources:
      - "{{.LOCKFILE}}"
      - ../../oxlint.config.ts
      - src/**/*

  fmt:
    cmd: bun oxfmt src/
    sources:
      - src/**/*
      - ../../.oxfmtrc.jsonc

  fmt:check:
    run: once
    cmd: bun oxfmt --check src/
    sources:
      - src/**/*
      - ../../.oxfmtrc.jsonc

  test:
    run: once
    cmd: bun test
    sources:
      - "{{.LOCKFILE}}"
      - src/**/*

  check:
    deps:
      - types
      - lint
      - fmt:check
      - test
