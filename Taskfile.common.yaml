version: 3

vars:
  LOCKFILE: ../../bun.lock

tasks:
  types:
    cmd: bun tsc
    sources:
      - "{{.LOCKFILE}}"
      - ../../tsconfig.base.json
      - tsconfig.json
      - src/**/*
    generates:
      - tsconfig.tsbuildinfo

  lint:
    cmd: bun eslint src/ --fix
    sources:
      - "{{.LOCKFILE}}"
      - ../../eslint.config.js
      - src/**/*

  test:
    cmd: bun test
    sources:
      - "{{.LOCKFILE}}"
      - src/**/*

  check:
    deps:
      - types
      - lint
      - test
